<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batak Taktik Rechner</title>
    
    <link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f5f5f5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #242424;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #ff9f43;
            margin-top: 0;
            font-size: 24px;
        }

        .card-selection {
            margin-top: 15px;
        }

        .card-row {
            margin-bottom: 20px;
            background-color: #2d2d2d;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #555;
        }

        /* Farbcodierung für die Reihen-Border */
        .card-row[data-color="Pik"] { border-left-color: #2c3e50; }
        .card-row[data-color="Kreuz"] { border-left-color: #16a085; }
        .card-row[data-color="Herz"] { border-left-color: #e74c3c; }
        .card-row[data-color="Karo"] { border-left-color: #f39c12; }

        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 6px;
            min-height: 40px;
        }

        /* Standard Button-Design (Dunkel/Dezent) */
        .card-btn {
            padding: 10px 0;
            background-color: #3a3a3a !important;
            color: #ffffff !important;
            border: 1px solid #555 !important;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .card-btn:hover {
            background-color: #4a4a4a !important;
        }

        /* Aktiv-Zustand (Sattes Grün für ausgewählte Karten) */
        .card-btn.active {
            background-color: #28a745 !important;
            color: #fff !important;
            border-color: #2bbf55 !important;
            transform: scale(0.95);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .status-box {
            margin: 20px 0 10px 0;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            background-color: #2d2d2d;
            padding: 10px;
            border-radius: 6px;
        }

        #calc-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ff9f43;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #calc-btn:disabled {
            background-color: #444;
            color: #777;
            cursor: not-allowed;
        }

        .hidden { display: none !important; }
        
        .result-section {
            margin-top: 20px;
            padding: 15px;
            background: #2d2d2d;
            color: white;
            border-radius: 8px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Batak Taktik Rechner</h1>

        <div class="card-selection">
            <div class="card-row" data-color="Pik">
                <h3>Pik (♠)</h3>
                <div class="cards" data-color="Pik"></div>
            </div>
            <div class="card-row" data-color="Karo">
                <h3>Karo (♦)</h3>
                <div class="cards" data-color="Karo"></div>
            </div>
            <div class="card-row" data-color="Herz">
                <h3>Herz (♥)</h3>
                <div class="cards" data-color="Herz"></div>
            </div>
            <div class="card-row" data-color="Kreuz">
                <h3>Kreuz (♣)</h3>
                <div class="cards" data-color="Kreuz"></div>
            </div>
        </div>

        <div class="status-box">
            Gewählt: <span id="card-count">0</span> / 16 Karten
        </div>

        <button id="calc-btn" onclick="analysiereHand()" disabled>Wahrscheinlichkeit berechnen</button>

        <div id="result-box" class="result-section hidden">
            <h2 style="margin-top: 0; color: #ff9f43;">Taktische Analyse</h2>
            <div style="margin-bottom: 8px;"><strong>Empfohlenes Gebot:</strong> <span id="rec-gebot" style="color: #28a745; font-weight: bold;">-</span></div>
            <div style="margin-bottom: 8px;"><strong>Wahrscheinlichkeit:</strong> <span id="rec-prob" style="color: #ff9f43; font-weight: bold;">-</span></div>
            <div><strong>Bester Trumpf:</strong> <span id="rec-trumpf" style="font-weight: bold;">-</span></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
